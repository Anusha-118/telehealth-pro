<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1976d2" />
    <meta name="description" content="TeleHealth Pro - Online Doctor Consultation Platform" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <title>TeleHealth Pro</title>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Inter', 'Roboto', sans-serif;
        background-color: #f5f7fa;
        -webkit-font-smoothing: antialiased;
      }
      #root { min-height: 100vh; }

      /* Loading spinner shown before React mounts */
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f5f7fa;
        z-index: 9999;
      }
      #initial-loader .logo {
        font-size: 2rem;
        font-weight: 800;
        color: #1976d2;
        margin-bottom: 16px;
      }
      #initial-loader .spinner {
        width: 40px; height: 40px;
        border: 4px solid #e3f2fd;
        border-top-color: #1976d2;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run TeleHealth Pro.</noscript>

    <!-- Shown until React loads -->
    <div id="initial-loader">
      <div class="logo">🏥 TeleHealth Pro</div>
      <div class="spinner"></div>
    </div>

    <div id="root"></div>

    <script>
      // Hide loader once React mounts
      window.addEventListener('load', function () {
        setTimeout(function () {
          var loader = document.getElementById('initial-loader');
          if (loader) loader.style.display = 'none';
        }, 500);
      });
    </script>
  </body>
</html>
